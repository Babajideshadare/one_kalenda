{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>One Kalenda</title>

    <!-- Inter font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
<div class="app-root">
    <!-- Top nav bar -->
    <header class="topbar">
        <div class="topbar-left">
            <!-- Sidebar collapse/expand icon -->
            <button class="sidebar-toggle" id="sidebarToggle" type="button">
                X
            </button>
            <div class="brand">Logo</div>
        </div>

        <div class="topbar-center">
            <a href="{% url 'create_calendar_entry' %}" class="topbar-action">
                Create Calendar Entry <span class="topbar-plus">+</span>
            </a>
        </div>

        <div class="topbar-right">
            <button class="topbar-link" type="button">Notifications</button>
            <button class="topbar-link" type="button">Settings</button>
            <button class="topbar-link" type="button">Profile</button>
        </div>
    </header>

    <!-- Body: sidebar + main content -->
    <div class="app-body">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav">
                <a href="#" class="sidebar-item active">
                    <span class="sidebar-icon">📅</span>
                    <span class="sidebar-label">Calendar View</span>
                    <span class="sidebar-dropdown">▾</span>
                </a>
                <a href="#" class="sidebar-item">
                    <span class="sidebar-icon">📊</span>
                    <span class="sidebar-label">Report</span>
                </a>
                <a href="#" class="sidebar-item">
                    <span class="sidebar-icon">📄</span>
                    <span class="sidebar-label">All Daily Notes</span>
                </a>
            </nav>
        </aside>

        <!-- Main content area -->
        <main class="content-wrapper">
            <!-- Tab row driven by CalendarEntry -->
            <div class="tab-bar">
                {% if entries %}
                    {% for entry in entries %}
                        <button
                            class="tab-item {% if entry == active_entry %}active{% endif %}"
                            type="button"
                            data-entry-id="{{ entry.id }}"
                        >
                            {{ entry.name }}
                        </button>
                    {% endfor %}
                {% else %}
                    <!-- No entries yet: show no tab names, just placeholder if you want -->
                {% endif %}
                <button class="tab-item tab-add" type="button">+</button>
            </div>

            <!-- Page content -->
            <div class="page-content">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>
</div>

<script src="{% static 'js/sidebar.js' %}"></script>
</body>
</html>
