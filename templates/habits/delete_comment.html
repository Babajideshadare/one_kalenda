{% extends 'base.html' %}

{% block content %}
<div class="rename-page">
    <div class="modal-card">
        <form method="post" class="modal-form">
            {% csrf_token %}
            <div class="modal-header">
                Delete Comment
            </div>
            <div class="modal-body">
                <div class="modal-title">
                    Delete this comment?
                </div>
                <div class="modal-subtitle">
                    "{{ comment.text|truncatechars:80 }}"
                </div>
            </div>
            <div class="modal-footer">
                <a href="{% url 'public_comments' %}" class="modal-btn modal-btn-no">
                    Cancel
                </a>
                <button type="submit" class="modal-btn modal-btn-danger">
                    Delete
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
